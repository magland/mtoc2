<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mtoc — numbl-to-C IDE</title>
    <script>
      // Single Page App redirect decode for GitHub Pages.
      // Paired with public/404.html, which encodes the deep-link path into ?p=.
      (function () {
        var search = location.search;
        if (search.length > 1) {
          var p = new URLSearchParams(search.slice(1));
          var path = p.get("p");
          if (path) {
            var query = p.get("q");
            var newUrl =
              location.protocol +
              "//" +
              location.host +
              location.pathname.replace(/\?.*$/, "").replace(/\/$/, "") +
              path.replace(/~and~/g, "&") +
              (query ? "?" + query.replace(/~and~/g, "&") : "") +
              location.hash;
            history.replaceState(null, "", newUrl);
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
