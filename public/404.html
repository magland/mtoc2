<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>mtoc</title>
    <script>
      // Single Page App redirect for GitHub Pages.
      // Encodes the full path as a query parameter and redirects to index.html,
      // where the inline decoder restores it via history.replaceState.
      var segmentCount = 0; // custom domain serves from root, no repo path segment
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + segmentCount)
            .join("/") +
          "/?p=/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(segmentCount)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&q=" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
