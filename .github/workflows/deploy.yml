name: Deploy to GitHub Pages

# Pages build for mtoc2. mtoc2 imports numbl source (parser + IDE
# components) directly from `../numbl`, so the build job checks numbl
# out as a sibling of the mtoc2 checkout before running `npm run build`.

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mtoc2
        uses: actions/checkout@v4
        with:
          path: mtoc2

      - name: Checkout numbl (sibling)
        uses: actions/checkout@v4
        with:
          repository: flatironinstitute/numbl
          path: numbl

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mtoc2/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: mtoc2

      - name: Build numbl stdlib
        run: npm run bundle:stdlib
        working-directory: numbl

      - name: Build
        run: npm run build
        working-directory: mtoc2

      - name: Run tests
        run: npm run test
        working-directory: mtoc2

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "mtoc2/dist"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
